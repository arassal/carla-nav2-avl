    ros_name: ego/rgb
    attrs: {image_size_x: "640", image_size_y: "360"}
    xyz: [1.5, 0.0, 1.6]
  - type: sensor.other.gnss
    ros_name: ego/gnss
    attrs: {}
    xyz: [0.0, 0.0, 1.6]
  - type: sensor.other.imu
    ros_name: ego/imu
    attrs: {}
    xyz: [0.0, 0.0, 1.6]
