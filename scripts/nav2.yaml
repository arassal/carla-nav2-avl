controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.05
    min_theta_velocity_threshold: 0.05
    failure_tolerance: 0.5
    controller_plugins: ["FollowPath"]
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 45.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 2.5
      yaw_goal_tolerance: 1.57

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 3.5
      min_approach_linear_velocity: 0.5
      lookahead_dist: 3.0
      min_lookahead_dist: 2.0
      max_lookahead_dist: 5.0
      lookahead_time: 1.0
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 0.2
      use_collision_detection: false
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 12.0
      regulated_linear_scaling_min_speed: 0.8
      use_rotate_to_heading: false
      allow_reversing: false
      max_angular_accel: 2.0
      max_robot_pose_search_dist: 8.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: ego
      rolling_window: true
      width: 40
      height: 40
      resolution: 0.2
      footprint: "[[2.0,0.9],[2.0,-0.9],[-2.0,-0.9],[-2.0,0.9]]"
      transform_tolerance: 0.3
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: lidar
        lidar:
          topic: /carla/ego/ego/lidar
          data_type: "PointCloud2"
          sensor_frame: "ego/lidar"
          max_obstacle_height: 3.0
          min_obstacle_height: -0.5
          clearing: true
          marking: true
          obstacle_max_range: 35.0
          obstacle_min_range: 0.5
          raytrace_max_range: 40.0
          raytrace_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 1.0

lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: ["controller_server"]
    bond_timeout: 0.0
