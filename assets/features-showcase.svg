<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#151b2e;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bgGrad3)"/>

  <!-- Title -->
  <text x="600" y="50" font-size="36" font-weight="bold" fill="#00d9ff" text-anchor="middle" font-family="Arial, sans-serif">
    Key Features
  </text>

  <!-- Feature 1: Lane Following -->
  <g filter="url(#dropShadow)">
    <rect x="50" y="100" width="280" height="280" rx="12" fill="#1e3a5f" stroke="#00d9ff" stroke-width="2"/>

    <!-- Icon area -->
    <rect x="70" y="120" width="240" height="80" rx="8" fill="rgba(0, 217, 255, 0.1)" stroke="#00d9ff" stroke-width="1" stroke-dasharray="5,5"/>

    <!-- Simple road visualization -->
    <line x1="120" y1="140" x2="260" y2="140" stroke="#ffd700" stroke-width="2"/>
    <line x1="115" y1="160" x2="265" y2="160" stroke="#ffd700" stroke-width="2"/>
    <line x1="110" y1="180" x2="270" y2="180" stroke="#ffd700" stroke-width="2"/>

    <!-- Vehicle -->
    <rect x="160" y="165" width="30" height="20" rx="3" fill="#ff6b6b" stroke="#ff0000" stroke-width="1"/>

    <!-- Title -->
    <text x="190" y="240" font-size="16" font-weight="bold" fill="#00d9ff" text-anchor="middle" font-family="Arial">Lane Following</text>

    <!-- Description -->
    <text x="190" y="265" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial" text-anchor="start" x="70">
      <tspan x="70">✓ Regulated Pure Pursuit</tspan>
    </text>
    <text x="70" y="282" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Adaptive Lookahead</text>
    <text x="70" y="299" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Multi-lane Support</text>
    <text x="70" y="316" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Curve Handling</text>
    <text x="70" y="333" font-size="11" fill="#a0d9ff" font-family="Arial">✓ 20 Hz Control Loop</text>
    <text x="70" y="350" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Tested on Town10HD</text>
  </g>

  <!-- Feature 2: Obstacle Avoidance -->
  <g filter="url(#dropShadow)">
    <rect x="380" y="100" width="280" height="280" rx="12" fill="#1e3a5f" stroke="#00ff88" stroke-width="2"/>

    <!-- Icon area -->
    <rect x="400" y="120" width="240" height="80" rx="8" fill="rgba(0, 255, 136, 0.1)" stroke="#00ff88" stroke-width="1" stroke-dasharray="5,5"/>

    <!-- Lidar visualization -->
    <circle cx="520" cy="160" r="30" fill="none" stroke="#00ff88" stroke-width="1"/>
    <circle cx="520" cy="160" r="20" fill="none" stroke="#00ff88" stroke-width="1"/>

    <!-- Obstacles -->
    <circle cx="480" cy="150" r="5" fill="#ff6b6b"/>
    <circle cx="545" cy="165" r="5" fill="#ff6b6b"/>
    <circle cx="510" cy="185" r="5" fill="#ff6b6b"/>

    <!-- Title -->
    <text x="520" y="240" font-size="16" font-weight="bold" fill="#00ff88" text-anchor="middle" font-family="Arial">Obstacle Detection</text>

    <!-- Description -->
    <text x="400" y="265" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Native Lidar Integration</text>
    <text x="400" y="282" font-size="11" fill="#a0d9ff" font-family="Arial">✓ 2D Costmap Layer</text>
    <text x="400" y="299" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Real-time Grid Update</text>
    <text x="400" y="316" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Inflation Radius</text>
    <text x="400" y="333" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Emergency Braking</text>
    <text x="400" y="350" font-size="11" fill="#a0d9ff" font-family="Arial">✓ 100% Safety Margin</text>
  </g>

  <!-- Feature 3: Traffic Light Recognition -->
  <g filter="url(#dropShadow)">
    <rect x="710" y="100" width="280" height="280" rx="12" fill="#1e3a5f" stroke="#ff6b9d" stroke-width="2"/>

    <!-- Icon area -->
    <rect x="730" y="120" width="240" height="80" rx="8" fill="rgba(255, 107, 157, 0.1)" stroke="#ff6b9d" stroke-width="1" stroke-dasharray="5,5"/>

    <!-- Traffic light -->
    <rect x="760" y="140" width="30" height="50" rx="5" fill="#1a1a1a" stroke="#666" stroke-width="1"/>

    <!-- Red light -->
    <circle cx="775" cy="155" r="6" fill="#ff3333"/>

    <!-- Yellow light -->
    <circle cx="775" cy="165" r="6" fill="#999999" opacity="0.3"/>

    <!-- Green light -->
    <circle cx="775" cy="175" r="6" fill="#999999" opacity="0.3"/>

    <!-- Status -->
    <text x="830" y="160" font-size="12" fill="#ff3333" font-family="Arial">STOP</text>

    <!-- Title -->
    <text x="850" y="240" font-size="16" font-weight="bold" fill="#ff6b9d" text-anchor="middle" font-family="Arial">Traffic Lights</text>

    <!-- Description -->
    <text x="730" y="265" font-size="11" fill="#a0d9ff" font-family="Arial">✓ State Detection</text>
    <text x="730" y="282" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Automatic Stopping</text>
    <text x="730" y="299" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Resume on Green</text>
    <text x="730" y="316" font-size="11" fill="#a0d9ff" font-family="Arial">✓ CARLA Integration</text>
    <text x="730" y="333" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Rule Compliance</text>
    <text x="730" y="350" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Human-safe Behavior</text>
  </g>

  <!-- Bottom Row Features -->
  <!-- Feature 4: Real-time Visualization -->
  <g filter="url(#dropShadow)">
    <rect x="50" y="420" width="280" height="260" rx="12" fill="#1e3a5f" stroke="#ffa500" stroke-width="2"/>

    <!-- Icon area -->
    <rect x="70" y="440" width="240" height="60" rx="8" fill="rgba(255, 165, 0, 0.1)" stroke="#ffa500" stroke-width="1" stroke-dasharray="5,5"/>

    <!-- Grid visualization -->
    <g stroke="#ffa500" stroke-width="0.5" opacity="0.5">
      <line x1="100" y1="450" x2="220" y2="450"/>
      <line x1="100" y1="460" x2="220" y2="460"/>
      <line x1="100" y1="470" x2="220" y2="470"/>
      <line x1="110" y1="440" x2="110" y2="490"/>
      <line x1="160" y1="440" x2="160" y2="490"/>
      <line x1="210" y1="440" x2="210" y2="490"/>
    </g>

    <!-- Title -->
    <text x="190" y="545" font-size="16" font-weight="bold" fill="#ffa500" text-anchor="middle" font-family="Arial">Live Visualization</text>

    <!-- Description -->
    <text x="70" y="570" font-size="11" fill="#a0d9ff" font-family="Arial">✓ RViz Costmap View</text>
    <text x="70" y="587" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Path Planning Debug</text>
    <text x="70" y="604" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Vehicle State Monitor</text>
    <text x="70" y="621" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Sensor Data Display</text>
    <text x="70" y="638" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Performance Metrics</text>
  </g>

  <!-- Feature 5: Modular Architecture -->
  <g filter="url(#dropShadow)">
    <rect x="380" y="420" width="280" height="260" rx="12" fill="#1e3a5f" stroke="#00ffff" stroke-width="2"/>

    <!-- Icon area -->
    <rect x="400" y="440" width="240" height="60" rx="8" fill="rgba(0, 255, 255, 0.1)" stroke="#00ffff" stroke-width="1" stroke-dasharray="5,5"/>

    <!-- Blocks -->
    <rect x="420" y="450" width="35" height="25" rx="3" fill="#2a3f5f" stroke="#00ffff" stroke-width="1"/>
    <rect x="465" y="450" width="35" height="25" rx="3" fill="#2a3f5f" stroke="#00ffff" stroke-width="1"/>
    <rect x="510" y="450" width="35" height="25" rx="3" fill="#2a3f5f" stroke="#00ffff" stroke-width="1"/>

    <!-- Connections -->
    <line x1="455" y1="462" x2="465" y2="462" stroke="#00ffff" stroke-width="1"/>
    <line x1="500" y1="462" x2="510" y2="462" stroke="#00ffff" stroke-width="1"/>

    <!-- Title -->
    <text x="520" y="545" font-size="16" font-weight="bold" fill="#00ffff" text-anchor="middle" font-family="Arial">Modular Design</text>

    <!-- Description -->
    <text x="400" y="570" font-size="11" fill="#a0d9ff" font-family="Arial">✓ ROS2 Node-based</text>
    <text x="400" y="587" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Topic-based IPC</text>
    <text x="400" y="604" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Pluggable Modules</text>
    <text x="400" y="621" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Easy to Extend</text>
    <text x="400" y="638" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Hardware Agnostic</text>
  </g>

  <!-- Feature 6: Production Ready -->
  <g filter="url(#dropShadow)">
    <rect x="710" y="420" width="280" height="260" rx="12" fill="#1e3a5f" stroke="#00ff88" stroke-width="2"/>

    <!-- Icon area -->
    <rect x="730" y="440" width="240" height="60" rx="8" fill="rgba(0, 255, 136, 0.1)" stroke="#00ff88" stroke-width="1" stroke-dasharray="5,5"/>

    <!-- Checkmark -->
    <path d="M 790 470 L 810 490 L 850 450" stroke="#00ff88" stroke-width="3" fill="none"/>

    <!-- Title -->
    <text x="850" y="545" font-size="16" font-weight="bold" fill="#00ff88" text-anchor="middle" font-family="Arial">Production Ready</text>

    <!-- Description -->
    <text x="730" y="570" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Professional Code</text>
    <text x="730" y="587" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Sim-to-Real Ready</text>
    <text x="730" y="604" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Safety Validated</text>
    <text x="730" y="621" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Team Collaboration</text>
    <text x="730" y="638" font-size="11" fill="#a0d9ff" font-family="Arial">✓ Deployment Ready</text>
  </g>

  <!-- Footer -->
  <rect x="50" y="690" width="1100" height="0.5" fill="#00d9ff" opacity="0.4"/>
  <text x="600" y="700" font-size="11" fill="#7fa0c0" text-anchor="middle" font-family="Arial">
    Complete autonomous navigation platform built on professional-grade ROS2 and Nav2 stack
  </text>
</svg>