<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#151b2e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bgGradient2)"/>

  <!-- Title -->
  <text x="600" y="50" font-size="36" font-weight="bold" fill="#00d9ff" text-anchor="middle" font-family="Arial, sans-serif">
    System Overview & Camera Layout
  </text>

  <!-- Left: Vehicle View from Above -->
  <text x="300" y="100" font-size="18" font-weight="bold" fill="#00d9ff" text-anchor="middle" font-family="Arial">Multi-View Camera Setup</text>

  <!-- Vehicle body (top-down) -->
  <rect x="200" y="140" width="200" height="300" rx="20" fill="#1a2a4f" stroke="#00d9ff" stroke-width="2" filter="url(#shadow2)"/>

  <!-- Front camera -->
  <circle cx="300" cy="140" r="25" fill="#ff6b6b" stroke="#ff0000" stroke-width="2"/>
  <text x="300" y="150" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle" font-family="Arial">FRONT</text>
  <line x1="300" y1="165" x2="300" y2="190" stroke="#ff6b6b" stroke-width="2"/>

  <!-- Left camera -->
  <circle cx="175" cy="290" r="25" fill="#ffd700" stroke="#ffaa00" stroke-width="2"/>
  <text x="175" y="300" font-size="11" font-weight="bold" fill="#000" text-anchor="middle" font-family="Arial">LEFT</text>
  <line x1="200" y1="290" x2="185" y2="290" stroke="#ffd700" stroke-width="2"/>

  <!-- Right camera -->
  <circle cx="425" cy="290" r="25" fill="#ffd700" stroke="#ffaa00" stroke-width="2"/>
  <text x="425" y="300" font-size="11" font-weight="bold" fill="#000" text-anchor="middle" font-family="Arial">RIGHT</text>
  <line x1="400" y1="290" x2="415" y2="290" stroke="#ffd700" stroke-width="2"/>

  <!-- Lidar on roof -->
  <circle cx="300" cy="150" r="20" fill="#00ff88" stroke="#00dd00" stroke-width="2" opacity="0.3"/>

  <!-- Field of view cones for cameras -->
  <path d="M 300 140 L 250 250 L 350 250 Z" stroke="#ff6b6b" stroke-width="1" fill="none" opacity="0.5" stroke-dasharray="3,3"/>
  <path d="M 175 315 L 100 380 L 200 380 Z" stroke="#ffd700" stroke-width="1" fill="none" opacity="0.5" stroke-dasharray="3,3"/>
  <path d="M 425 315 L 400 380 L 500 380 Z" stroke="#ffd700" stroke-width="1" fill="none" opacity="0.5" stroke-dasharray="3,3"/>

  <!-- Camera Specs Table -->
  <rect x="50" y="480" width="500" height="280" rx="10" fill="rgba(30, 58, 95, 0.4)" stroke="#00d9ff" stroke-width="2" filter="url(#shadow2)"/>

  <text x="300" y="510" font-size="16" font-weight="bold" fill="#00d9ff" text-anchor="middle" font-family="Arial">Camera Specifications</text>

  <!-- Table Header -->
  <rect x="70" y="530" width="460" height="35" rx="5" fill="#1e3a5f" stroke="#00d9ff" stroke-width="1"/>
  <text x="130" y="555" font-size="12" font-weight="bold" fill="#00d9ff" text-anchor="middle" font-family="Arial">Camera</text>
  <text x="240" y="555" font-size="12" font-weight="bold" fill="#00d9ff" text-anchor="middle" font-family="Arial">Resolution</text>
  <text x="370" y="555" font-size="12" font-weight="bold" fill="#00d9ff" text-anchor="middle" font-family="Arial">FOV</text>
  <text x="470" y="555" font-size="12" font-weight="bold" fill="#00d9ff" text-anchor="middle" font-family="Arial">Type</text>

  <!-- Row 1: Front -->
  <rect x="70" y="570" width="460" height="30" rx="3" fill="#2a3f5f"/>
  <text x="130" y="592" font-size="11" fill="#ff6b6b" font-weight="bold" text-anchor="middle" font-family="Arial">FRONT</text>
  <text x="240" y="592" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">1280×720 @ 30Hz</text>
  <text x="370" y="592" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">110°</text>
  <text x="470" y="592" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">RGB</text>

  <!-- Row 2: Left -->
  <rect x="70" y="605" width="460" height="30" rx="3" fill="#2a3f5f"/>
  <text x="130" y="627" font-size="11" fill="#ffd700" font-weight="bold" text-anchor="middle" font-family="Arial">LEFT</text>
  <text x="240" y="627" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">1280×720 @ 30Hz</text>
  <text x="370" y="627" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">110°</text>
  <text x="470" y="627" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">RGB</text>

  <!-- Row 3: Right -->
  <rect x="70" y="640" width="460" height="30" rx="3" fill="#2a3f5f"/>
  <text x="130" y="662" font-size="11" fill="#ffd700" font-weight="bold" text-anchor="middle" font-family="Arial">RIGHT</text>
  <text x="240" y="662" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">1280×720 @ 30Hz</text>
  <text x="370" y="662" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">110°</text>
  <text x="470" y="662" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">RGB</text>

  <!-- Row 4: Lidar -->
  <rect x="70" y="675" width="460" height="30" rx="3" fill="#2a3f5f"/>
  <text x="130" y="697" font-size="11" fill="#00ff88" font-weight="bold" text-anchor="middle" font-family="Arial">LIDAR</text>
  <text x="240" y="697" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">65536 points @ 20Hz</text>
  <text x="370" y="697" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">360°</text>
  <text x="470" y="697" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">PointCloud2</text>

  <!-- Right Side: System Stack -->
  <text x="900" y="100" font-size="18" font-weight="bold" fill="#00d9ff" text-anchor="middle" font-family="Arial">Software Stack</text>

  <!-- Stack Layers -->
  <rect x="650" y="140" width="500" height="600" rx="10" fill="rgba(30, 58, 95, 0.4)" stroke="#00d9ff" stroke-width="2" filter="url(#shadow2)"/>

  <!-- Layer 1: CARLA -->
  <rect x="670" y="160" width="460" height="70" rx="8" fill="#2a3f5f" stroke="#ffd700" stroke-width="2"/>
  <text x="900" y="185" font-size="13" font-weight="bold" fill="#ffd700" text-anchor="middle" font-family="Arial">CARLA 0.10.0 (UE5)</text>
  <text x="900" y="205" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">High-fidelity simulator with native ROS2 integration</text>

  <!-- Layer 2: ROS2 -->
  <rect x="670" y="245" width="460" height="70" rx="8" fill="#2a3f5f" stroke="#00ff88" stroke-width="2"/>
  <text x="900" y="270" font-size="13" font-weight="bold" fill="#00ff88" text-anchor="middle" font-family="Arial">ROS2 Humble (Domain 0)</text>
  <text x="900" y="290" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">Modular architecture, sensor aggregation, TF tree</text>

  <!-- Layer 3: Nav2 -->
  <rect x="670" y="330" width="460" height="70" rx="8" fill="#2a3f5f" stroke="#ff6b9d" stroke-width="2"/>
  <text x="900" y="355" font-size="13" font-weight="bold" fill="#ff6b9d" text-anchor="middle" font-family="Arial">Navigation2 Stack</text>
  <text x="900" y="375" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">Path planning, costmaps, pure pursuit controller</text>

  <!-- Layer 4: Control -->
  <rect x="670" y="415" width="460" height="70" rx="8" fill="#2a3f5f" stroke="#00d9ff" stroke-width="2"/>
  <text x="900" y="440" font-size="13" font-weight="bold" fill="#00d9ff" text-anchor="middle" font-family="Arial">Vehicle Control</text>
  <text x="900" y="460" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">Steering, throttle, brake commands at 20 Hz</text>

  <!-- Layer 5: Custom Nodes -->
  <rect x="670" y="500" width="460" height="70" rx="8" fill="#2a3f5f" stroke="#ffa500" stroke-width="2"/>
  <text x="900" y="525" font-size="13" font-weight="bold" fill="#ffa500" text-anchor="middle" font-family="Arial">Custom ROS2 Nodes</text>
  <text x="900" y="545" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">Bridge, localization, visualization, safety monitoring</text>

  <!-- Layer 6: Visualization -->
  <rect x="670" y="585" width="460" height="70" rx="8" fill="#2a3f5f" stroke="#00ffff" stroke-width="2"/>
  <text x="900" y="610" font-size="13" font-weight="bold" fill="#00ffff" text-anchor="middle" font-family="Arial">Real-time Visualization</text>
  <text x="900" y="630" font-size="11" fill="#a0d9ff" text-anchor="middle" font-family="Arial">RViz maps and debugging, live sensor data feeds</text>

  <!-- Bottom stats -->
  <rect x="50" y="780" width="1100" height="0.5" fill="#00d9ff" opacity="0.4"/>

  <!-- Key Info -->
  <text x="150" y="760" font-size="11" fill="#7fa0c0" font-family="Arial">
    ⚡ <tspan font-weight="bold">20 Hz</tspan> Control Loop
  </text>
  <text x="400" y="760" font-size="11" fill="#7fa0c0" font-family="Arial">
    📡 <tspan font-weight="bold">3x RGB</tspan> Cameras + Lidar
  </text>
  <text x="700" y="760" font-size="11" fill="#7fa0c0" font-family="Arial">
    🎯 <tspan font-weight="bold">Professional Grade</tspan> Stack
  </text>
  <text x="1000" y="760" font-size="11" fill="#7fa0c0" font-family="Arial">
    ✓ Sim-to-Real <tspan font-weight="bold">Ready</tspan>
  </text>
</svg>